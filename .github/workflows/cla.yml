# This version of the CLA Assistant uses a GitHub action and local
# storage of the signatures.
# https://github.com/contributor-assistant/github-action/

name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, closed, synchronize]

jobs:
  CLAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request'
        uses: iainmcgin/cla-github-action@b2654283c3d541393bf2c6efa1e0097537186313 # v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.OSS_CONTRIBUTOR_LICENSE_AGREEMENT }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/Staffbase/custom-widgets-examples/blob/main/CLA.md"
          # branch should not be protected
          branch: "signatures"
          allowlist: staffbot,dependabot,Copilot,wiebkesoehrens,noreply@anthropic.com,noreply@opencode.ai,copilot@noreply.github.com,*[bot]
